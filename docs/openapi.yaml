openapi: 3.0.3
info:
  title: CodeAlpha JobBoard
  version: 1.0.0

servers:
  - url: /api

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    # ── Shared response envelopes ──────────────────────────────────────────────

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string

    # ── Domain models ──────────────────────────────────────────────────────────

    User:
      type: object
      properties:
        _id:
          type: string
          description: MongoDB ObjectId
        email:
          type: string
          format: email
        role:
          type: string
          enum: [employer, candidate, admin]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Candidate:
      type: object
      properties:
        _id:
          type: string
        user:
          type: string
          description: ObjectId ref to User
        name:
          type: string
        phone:
          type: string
        resume:
          type: array
          items:
            type: string
            description: ObjectId ref to Resume
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Employer:
      type: object
      properties:
        _id:
          type: string
        user:
          type: string
          description: ObjectId ref to User
        name:
          type: string
        company:
          type: string
        location:
          type: string
        phone:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Job:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        employer:
          type: string
          description: ObjectId ref to Employer
        description:
          type: string
        skills:
          type: array
          items:
            type: string
        location:
          type: string
        jobType:
          type: string
          enum: [full-time, part-time, contract, internship]
        salary:
          type: number
        status:
          type: string
          enum: [accepting, filled, canceled, deleted]
          default: accepting
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Application:
      type: object
      properties:
        _id:
          type: string
        candidate:
          type: string
          description: ObjectId ref to Candidate
        job:
          type: string
          description: ObjectId ref to Job
        resume:
          type: string
          description: ObjectId ref to Resume (optional)
        status:
          type: string
          enum: [processing, accepted, declined, withdrawn, deleted]
          default: processing
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Resume:
      type: object
      properties:
        _id:
          type: string
        fileName:
          type: string
        filePath:
          type: string
        candidate:
          type: string
          description: ObjectId ref to Candidate
        status:
          type: string
          enum: [active, deleted]
          default: active
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

# ── Paths ──────────────────────────────────────────────────────────────────────

paths:

  /auth/register:
    post:
      tags: [auth]
      summary: Register a new user and return a signed JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, phone, role]
              properties:
                name:
                  type: string
                  example: Jane Doe
                email:
                  type: string
                  format: email
                  example: jane@example.com
                password:
                  type: string
                  description: >
                    Min 8 characters; must contain at least one uppercase letter,
                    one lowercase letter, and one special character (!@#$%^&*).
                  example: "Secret@1"
                phone:
                  type: string
                  description: "Format: +[country code] [number]"
                  example: "+1 1234567890"
                company:
                  type: string
                  description: Required when role is employer.
                location:
                  type: string
                  description: Required when role is employer.
                role:
                  type: string
                  enum: [employer, candidate, admin]
      responses:
        '201':
          description: Registration successful — returns a JWT token
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          token:
                            type: string
                            description: Signed JWT
        '400':
          description: Validation error or user already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags: [auth]
      summary: Authenticate a user and return a signed JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: jane@example.com
                password:
                  type: string
                  example: "Secret@1"
      responses:
        '200':
          description: Login successful — returns a JWT token
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          token:
                            type: string
                            description: Signed JWT
        '400':
          description: Request body failed Joi validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: User not found or incorrect password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /jobs/mine:
    get:
      tags: [jobs]
      summary: Get all job listings posted by the authenticated employer
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of the employer's job listings
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Job'
        '400':
          description: Error fetching listings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized — missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /jobs:
    get:
      tags: [jobs]
      summary: Get all job listings (with optional filters)
      parameters:
        - name: location
          in: query
          schema:
            type: string
        - name: jobType
          in: query
          schema:
            type: string
            enum: [full-time, part-time, contract, internship]
        - name: status
          in: query
          schema:
            type: string
            enum: [accepting, filled, canceled, deleted]
        - name: title
          in: query
          description: Case-insensitive partial match on job title
          schema:
            type: string
      responses:
        '200':
          description: List of jobs
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Job'
        '400':
          description: Query error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags: [jobs]
      summary: Create a new job listing (employer only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, description, skills, location, jobType]
              properties:
                title:
                  type: string
                  example: Senior Backend Engineer
                description:
                  type: string
                skills:
                  type: array
                  items:
                    type: string
                  example: [Node.js, MongoDB]
                location:
                  type: string
                  example: New York, NY
                jobType:
                  type: string
                  enum: [full-time, part-time, contract, internship]
                salary:
                  type: number
                  example: 120000
      responses:
        '201':
          description: Job created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Job'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized — missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /jobs/{id}:
    get:
      tags: [jobs]
      summary: Get a single job listing by ID
      parameters:
        - name: id
          in: path
          required: true
          description: Job ObjectId
          schema:
            type: string
      responses:
        '200':
          description: Job found
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Job'
        '400':
          description: Missing or invalid ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags: [jobs]
      summary: Update an existing job listing (employer only — must own the listing)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Job ObjectId
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                skills:
                  type: array
                  items:
                    type: string
                location:
                  type: string
                jobType:
                  type: string
                  enum: [full-time, part-time, contract, internship]
                salary:
                  type: number
                status:
                  type: string
                  enum: [accepting, filled, canceled]
      responses:
        '200':
          description: Job updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Job'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized — missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [jobs]
      summary: Delete a job listing (employer only — must own the listing)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Job ObjectId
          schema:
            type: string
      responses:
        '200':
          description: Job deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Error deleting job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized — missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /applications:
    get:
      tags: [applications]
      summary: Get all applications for the authenticated user
      description: >
        Candidates receive their own applications; employers receive all applications
        submitted to their job listings. Optionally filter by `status`.
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          description: Filter by application status
          schema:
            type: string
            enum: [processing, accepted, declined, withdrawn]
      responses:
        '200':
          description: List of applications
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Application'
        '400':
          description: Query error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized — missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Role not permitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags: [applications]
      summary: Submit a new job application (candidate only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [jobId]
              properties:
                jobId:
                  type: string
                  description: MongoDB ObjectId of the job to apply for
                  pattern: '^[a-f\d]{24}$'
                  example: 6651c2f0e3b4a12d88f00001
                resume:
                  type: string
                  description: MongoDB ObjectId of the candidate's resume (optional)
                  pattern: '^[a-f\d]{24}$'
                  example: 6651c2f0e3b4a12d88f00002
      responses:
        '201':
          description: Application submitted successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Application'
        '400':
          description: Validation error or job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized — missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — only candidates may submit applications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /applications/{id}:
    get:
      tags: [applications]
      summary: Get a single application by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Application ObjectId
          schema:
            type: string
      responses:
        '200':
          description: Application found
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Application'
        '400':
          description: Missing or invalid ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized — missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Role not permitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags: [applications]
      summary: Update an application status
      description: >
        **Candidates** may only withdraw their own application (no body required — the
        status is set to `withdrawn` automatically).
        **Employers** may set the status to `accepted` or `declined` by passing `newStatus`.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Application ObjectId
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                newStatus:
                  type: string
                  enum: [accepted, declined]
                  description: Required when the caller is an employer.
      responses:
        '200':
          description: Application updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Application'
        '400':
          description: Validation error or application not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized — missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Role not permitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [applications]
      summary: Delete an application (candidate only — must own the application)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Application ObjectId
          schema:
            type: string
      responses:
        '200':
          description: Application deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Error deleting application
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized — missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — only candidates may delete applications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /resumes:
    get:
      tags: [resumes]
      summary: Get all resumes for the authenticated candidate
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of resumes
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Resume'
        '400':
          description: Error fetching resumes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized — missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags: [resumes]
      summary: Upload one or more resume files (candidate only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                resumes:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: One or more resume files to upload
      responses:
        '201':
          description: Resume(s) uploaded successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Resume'
        '400':
          description: Upload error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized — missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /resumes/{id}:
    get:
      tags: [resumes]
      summary: Get a single resume by ID (candidate only — must own the resume)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Resume ObjectId
          schema:
            type: string
      responses:
        '200':
          description: Resume found
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Resume'
        '400':
          description: Missing or invalid ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized — missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [resumes]
      summary: Delete a resume (candidate only — must own the resume)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Resume ObjectId
          schema:
            type: string
      responses:
        '200':
          description: Resume deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Error deleting resume
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized — missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /resumes/{id}/download:
    get:
      tags: [resumes]
      summary: Download a resume file by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Resume ObjectId
          schema:
            type: string
      responses:
        '200':
          description: Resume file download
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          description: Resume not found or error streaming file
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized — missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
