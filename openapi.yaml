openapi: 3.0.3
info:
  title: Codealpha Jobboard
  version: 1.0.0
  description: REST API for the CodeAlpha Job Board application

servers:
  - url: /api

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        _id:
          type: string
          description: ObjectId
        email:
          type: string
          format: email
        role:
          type: string
          enum: [employer, candidate, admin]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [email, role]

    Candidate:
      type: object
      properties:
        _id:
          type: string
          description: ObjectId
        user:
          type: string
          description: ObjectId ref to User
        name:
          type: string
        phone:
          type: string
        resume:
          type: array
          items:
            type: string
            description: ObjectId ref to Resume
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [user, name, phone]

    Employer:
      type: object
      properties:
        _id:
          type: string
          description: ObjectId
        user:
          type: string
          description: ObjectId ref to User
        name:
          type: string
        company:
          type: string
        location:
          type: string
        phone:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [user, name, company, location, phone]

    Job:
      type: object
      properties:
        _id:
          type: string
          description: ObjectId
        title:
          type: string
        employer:
          type: string
          description: ObjectId ref to Employer
        description:
          type: string
        skills:
          type: array
          items:
            type: string
        location:
          type: string
        jobType:
          type: string
          enum: [full-time, part-time, contract, internship]
        salary:
          type: number
        status:
          type: string
          enum: [accepting, filled, canceled, deleted]
          default: accepting
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [title, employer, description, skills, location, jobType, status]

    Application:
      type: object
      properties:
        _id:
          type: string
          description: ObjectId
        candidate:
          type: string
          description: ObjectId ref to Candidate
        job:
          type: string
          description: ObjectId ref to Job
        status:
          type: string
          enum: [processing, accepted, declined, withdrawn]
          default: processing
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [candidate, job, status]

    Resume:
      type: object
      properties:
        _id:
          type: string
          description: ObjectId
        fileName:
          type: string
        filePath:
          type: string
        user:
          type: string
          description: ObjectId ref to Candidate
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [fileName, filePath, user]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string

paths:
  /auth/register:
    post:
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, phone, role]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  description: >
                    At least 8 characters, must contain uppercase, lowercase,
                    and one special character (!@#$%^&*)
                  example: MyP@ssword1
                phone:
                  type: string
                  description: "Format: +[country code] [number], e.g. +1 1234567890"
                  example: "+1 1234567890"
                company:
                  type: string
                  description: Required for employer accounts
                location:
                  type: string
                role:
                  type: string
                  enum: [employer, candidate, admin]
      responses:
        "201":
          description: Registration successful — returns a JWT token
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          token:
                            type: string
        "400":
          description: Validation error or user already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      tags: [auth]
      summary: Log in and receive a JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Login successful — returns a JWT token
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          token:
                            type: string
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /job:
    get:
      tags: [job]
      summary: Get all job listings (with optional filters)
      parameters:
        - name: location
          in: query
          schema:
            type: string
        - name: jobType
          in: query
          schema:
            type: string
            enum: [full-time, part-time, contract, internship]
        - name: status
          in: query
          schema:
            type: string
            enum: [accepting, filled, canceled, deleted]
        - name: title
          in: query
          description: Case-insensitive partial match on job title
          schema:
            type: string
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Job"
        "400":
          description: Query error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      tags: [job]
      summary: Create a new job listing (employer only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, description, skills, location, jobType]
              properties:
                title:
                  type: string
                description:
                  type: string
                skills:
                  type: array
                  items:
                    type: string
                location:
                  type: string
                jobType:
                  type: string
                  enum: [full-time, part-time, contract, internship]
                salary:
                  type: number
      responses:
        "201":
          description: Job created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Job"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /job/mine:
    get:
      tags: [job]
      summary: Get all job listings posted by the authenticated employer
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of the employer's job listings
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Job"
        "400":
          description: Error fetching listings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /job/{id}:
    get:
      tags: [job]
      summary: Get a single job listing by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Job ObjectId
      responses:
        "200":
          description: Job found
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Job"
        "400":
          description: Missing or invalid ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      tags: [job]
      summary: Update an existing job listing (employer only — must own the listing)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Job ObjectId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                skills:
                  type: array
                  items:
                    type: string
                location:
                  type: string
                jobType:
                  type: string
                  enum: [full-time, part-time, contract, internship]
                salary:
                  type: number
                status:
                  type: string
                  enum: [accepting, filled, canceled]
      responses:
        "200":
          description: Job updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Job"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags: [job]
      summary: Delete a job listing (employer only — must own the listing)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Job ObjectId
      responses:
        "200":
          description: Job deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Error deleting job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
